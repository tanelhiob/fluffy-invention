name: Build and Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore dependencies
        run: dotnet restore HelloWorld/HelloWorld.csproj

      - name: Build
        run: dotnet build HelloWorld/HelloWorld.csproj --no-restore

      - name: Run app and verify response
        run: |
          dotnet run --project HelloWorld/HelloWorld.csproj --urls http://localhost:5000 &
          APP_PID=$!

          # Wait for the app to start
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000 > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Verify the response
          RESPONSE=$(curl -s http://localhost:5000)
          echo "Response: $RESPONSE"

          kill $APP_PID

          if [ "$RESPONSE" = "Hello, World!" ]; then
            echo "Success! App returned expected response."
          else
            echo "Unexpected response."
            exit 1
          fi
