<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Waiting for Saskia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
        }
        .timer-display {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .timer-display .value {
            font-size: 2.8rem;
            font-weight: 700;
        }
        #status-badge {
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card p-4 p-md-5 text-center shadow-lg">
                    <h1 class="mb-2 fw-bold">Waiting for Saskia</h1>
                    <p class="mb-4 opacity-75">at the spa</p>

                    <div id="timer-section" class="mb-4" style="display: none;">
                        <span id="status-badge" class="badge bg-warning text-dark mb-3">Waiting&hellip;</span>
                        <div id="timer" class="timer-display"></div>
                    </div>

                    <div id="picker-section">
                        <label for="start-time" class="form-label">When did the wait start?</label>
                        <input type="datetime-local" id="start-time" class="form-control form-control-lg mb-3" />
                        <button id="start-btn" class="btn btn-light btn-lg w-100">Start counting</button>
                    </div>

                    <button id="reset-btn" class="btn btn-outline-light btn-sm mt-3" style="display: none;">
                        Pick a different time
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const STORAGE_KEY = 'saskia-spa-start-time';
        const startTimeInput = document.getElementById('start-time');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const timerSection = document.getElementById('timer-section');
        const pickerSection = document.getElementById('picker-section');
        const timerDisplay = document.getElementById('timer');
        let intervalId = null;

        // Default the picker to now
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        startTimeInput.value = now.toISOString().slice(0, 16);

        function pluralize(n, word) {
            return n === 1 ? word : word + 's';
        }

        function updateTimer(startTime) {
            const diff = Date.now() - startTime.getTime();
            if (diff < 0) {
                timerDisplay.textContent = "That's in the future!";
                return;
            }

            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            timerDisplay.innerHTML =
                `<span class="value">${days}</span> ${pluralize(days, 'day')} ` +
                `<span class="value">${hours}</span> ${pluralize(hours, 'hour')} ` +
                `<span class="value">${minutes}</span> ${pluralize(minutes, 'minute')} ` +
                `and <span class="value">${seconds}</span> ${pluralize(seconds, 'second')}`;
        }

        function startCounting(startTime) {
            pickerSection.style.display = 'none';
            timerSection.style.display = 'block';
            resetBtn.style.display = 'inline-block';

            updateTimer(startTime);
            intervalId = setInterval(() => updateTimer(startTime), 1000);
        }

        function reset() {
            if (intervalId) clearInterval(intervalId);
            localStorage.removeItem(STORAGE_KEY);
            timerSection.style.display = 'none';
            resetBtn.style.display = 'none';
            pickerSection.style.display = 'block';
        }

        // Try loading from localStorage
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const savedDate = new Date(saved);
            if (!isNaN(savedDate.getTime())) {
                startCounting(savedDate);
            }
        }

        startBtn.addEventListener('click', () => {
            const picked = new Date(startTimeInput.value);
            if (isNaN(picked.getTime())) return;
            localStorage.setItem(STORAGE_KEY, picked.toISOString());
            startCounting(picked);
        });

        resetBtn.addEventListener('click', reset);
    </script>
</body>
</html>
